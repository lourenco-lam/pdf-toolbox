name: Build macOS Application

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --windowed --name "PDF Toolbox" --icon="src/icon.icns" --add-data "src/main_window.ui:." --add-data "src/icon.png:." --hidden-import controller --hidden-import pdf_engine src/main.py

      - name: Zip the Mac App
        run: |
          cd dist
          zip -r PDF-Toolbox-macOS.zip "PDF Toolbox.app"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Toolbox-macOS
          path: dist/PDF-Toolbox-macOS.zip
