name: Build Windows Application

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: cmd
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "PDF Toolbox" --icon="src/icon.ico" --add-data "src/main_window.ui;." --add-data "src/icon.png;." --hidden-import controller --hidden-import pdf_engine --hidden-import docx2pdf src/main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Toolbox-Windows
          path: dist/PDF Toolbox.exe