name: Build Windows Executable

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: cmd
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "PDF Toolbox" --add-data "src/main_window.ui;src" --hidden-import controller --hidden-import pdf_engine src/main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Toolbox-Windows
          path: dist/
